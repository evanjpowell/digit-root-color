<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Digit Root Color</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #000;
    color: #eee;
    font-family: monospace;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #content {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 40px;
    padding: 60px 20px;
    max-width: 600px;
    width: 100%;
  }

  h1 {
    font-size: 1.4em;
    font-weight: normal;
    letter-spacing: 0.12em;
    color: #ccc;
  }

  #description {
    font-size: 14px;
    color: #666;
    text-align: center;
    line-height: 1.7;
    max-width: 440px;
  }

  #blocks {
    display: flex;
    gap: 16px;
  }

  .block {
    width: 45px;
    height: 45px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.4em;
    font-weight: bold;
    letter-spacing: 0.04em;
    cursor: pointer;
    border-radius: 2px;
    outline: 1px solid rgba(0,0,0,0.2);
    transition: opacity 0.15s;
  }
  .block:hover { opacity: 0.85; }

  #links {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }

  #links a {
    color: #7aa8d8;
    text-decoration: none;
    font-size: 14px;
    letter-spacing: 0.06em;
    border-bottom: 1px solid #4a78a8;
    padding-bottom: 2px;
  }
  #links a:hover { color: #a8ccee; border-color: #7aa8d8; }

  /* Modal */
  #overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  #overlay.open { display: flex; }

  #modal {
    background: #181818;
    border: 1px solid #333;
    border-radius: 6px;
    padding: 28px 32px;
    min-width: 280px;
    max-width: 420px;
    font-family: monospace;
    color: #ddd;
    position: relative;
  }

  #modal-close {
    position: absolute;
    top: 10px; right: 14px;
    background: none;
    border: none;
    color: #666;
    font-size: 18px;
    cursor: pointer;
    line-height: 1;
  }
  #modal-close:hover { color: #bbb; }

  #modal-number {
    font-size: 2em;
    font-weight: bold;
    letter-spacing: 0.04em;
    margin-bottom: 4px;
  }

  #modal-subtitle {
    font-size: 12px;
    color: #666;
    margin-bottom: 22px;
  }

  .modal-step {
    font-size: 15px;
    color: #999;
    margin-bottom: 10px;
    letter-spacing: 0.02em;
  }
  .modal-step .eq { color: #bbb; }

  #modal-result {
    display: inline-block;
    margin-top: 14px;
    padding: 6px 18px;
    border-radius: 4px;
    font-size: 1.3em;
    font-weight: bold;
    letter-spacing: 0.06em;
  }
</style>
</head>
<body>

<div id="content">
  <h1>Digit Root Color</h1>

  <div id="description">
    <p>
      Simple color-based visualization of single-digit digit roots. For numbers
      with multi-digit digit roots, the root is taken recursively until a single-digit root is
      reached. 
    </p>
  </div>

  <div id="blocks"></div>

  <div id="links">
    <a href="digit_root_grid.html">&#8594; Digit Root Grid</a>
    <a href="pascal_digit_root.html">&#8594; Pascal's Triangle</a>
  </div>
</div>

<!-- Modal -->
<div id="overlay">
  <div id="modal">
    <button id="modal-close">&#x2715;</button>
    <div id="modal-number"></div>
    <div id="modal-subtitle"></div>
    <div id="modal-steps"></div>
    <div id="modal-result"></div>
  </div>
</div>

<script>
const BASE = 10;
const NUMBERS = [37, 49, 88, 108];

const DIGITS = '0123456789';

function digitRoot(n, base) {
  return n === 0 ? 0 : ((n - 1) % (base - 1)) + 1;
}

function digitRootSteps(n, base) {
  if (n === 0) return [];
  const steps = [];
  let cur = n;
  while (cur >= base) {
    const digits = [];
    let tmp = cur;
    while (tmp > 0) { digits.unshift(tmp % base); tmp = Math.floor(tmp / base); }
    const sum = digits.reduce((a, b) => a + b, 0);
    steps.push({ terms: digits.map(d => String(d)), sumStr: String(sum) });
    cur = sum;
  }
  return steps;
}

function hslToRgb(h, s, l) {
  s /= 100; l /= 100;
  const k = n => (n + h / 30) % 12;
  const a = s * Math.min(l, 1 - l);
  const f = n => l - a * Math.max(-1, Math.min(k(n) - 3, Math.min(9 - k(n), 1)));
  return [Math.round(f(0) * 255), Math.round(f(8) * 255), Math.round(f(4) * 255)];
}

function needsLightText(r, g, b) {
  const lin = c => { c /= 255; return c <= 0.03928 ? c / 12.92 : Math.pow((c + 0.055) / 1.055, 2.4); };
  return 0.2126 * lin(r) + 0.7152 * lin(g) + 0.0722 * lin(b) < 0.35;
}

function wheelColor(root, base) {
  if (root === 0) return { bg: [30, 30, 30], light: true };
  const hue     = ((root - 1) / (base - 1)) * 360;
  const [r,g,b] = hslToRgb(hue, 80, 50);
  return { bg: [r, g, b], light: needsLightText(r, g, b) };
}

// Build blocks
const blocksEl = document.getElementById('blocks');
NUMBERS.forEach(n => {
  const root = digitRoot(n, BASE);
  const c    = wheelColor(root, BASE);
  const div  = document.createElement('div');
  div.className  = 'block';
  div.textContent = String(n);
  div.style.background = `rgb(${c.bg[0]},${c.bg[1]},${c.bg[2]})`;
  div.style.color      = c.light ? 'rgba(255,255,255,0.9)' : 'rgba(0,0,0,0.8)';
  div.addEventListener('click', () => openModal(n));
  blocksEl.appendChild(div);
});

// Modal
const overlay = document.getElementById('overlay');

function openModal(n) {
  const root  = digitRoot(n, BASE);
  const c     = wheelColor(root, BASE);
  const steps = digitRootSteps(n, BASE);

  document.getElementById('modal-number').textContent  = String(n);
  document.getElementById('modal-subtitle').textContent = `base ${BASE}  ·  digit root`;

  const stepsEl = document.getElementById('modal-steps');
  stepsEl.innerHTML = '';

  if (steps.length === 0) {
    const p = document.createElement('div');
    p.className = 'modal-step';
    p.style.color = '#666';
    p.textContent = `${n} is already a single digit`;
    stepsEl.appendChild(p);
  } else {
    steps.forEach(({ terms, sumStr }) => {
      const p = document.createElement('div');
      p.className = 'modal-step';
      p.innerHTML = `<span>${terms.join(' + ')}</span> <span class="eq">= ${sumStr}</span>`;
      stepsEl.appendChild(p);
    });
  }

  const resultEl = document.getElementById('modal-result');
  const [r,g,b]  = c.bg;
  resultEl.textContent       = String(root);
  resultEl.style.background  = `rgb(${r},${g},${b})`;
  resultEl.style.color       = c.light ? 'rgba(255,255,255,0.95)' : 'rgba(0,0,0,0.8)';

  overlay.classList.add('open');
}

function closeModal() { overlay.classList.remove('open'); }

document.getElementById('modal-close').addEventListener('click', closeModal);
overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
</script>
</body>
</html>
